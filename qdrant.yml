apiVersion: v1
kind: Secret
metadata:
  name: qdrant-secret
  namespace: atlassian
type: Opaque
stringData:
  api-key: "testajainimah" 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: atlassian
  labels:
    app: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        ports:
        - containerPort: 6333 # HTTP Port
        - containerPort: 6334 # gRPC Port
        env:
        - name: QDRANT__SERVICE__API_KEY
          valueFrom:
            secretKeyRef:
              name: qdrant-secret
              key: api-key
        # Resource limits sangat direkomendasikan agar tidak terjadi OOM
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: atlassian
spec:
  type: ClusterIP
  selector:
    app: qdrant
  ports:
  - name: http
    port: 6333
    targetPort: 6333
  - name: grpc
    port: 6334
    targetPort: 6334
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qdrant-ingress
  namespace: atlassian
  annotations:
    # Mengizinkan payload besar saat melakukan upsert vektor data (default Nginx hanya 1MB)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: qdrant.staytech.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qdrant-service
            port:
              number: 6333
